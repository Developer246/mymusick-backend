version: "3.9"

services:

  # ─── Cloudflare WARP como proxy HTTP ───────────────────────────────────────
  warp-proxy:
    image: ghcr.io/patrickplaggenborg/warp-proxy:latest
    container_name: warp-proxy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp-config:/config   # persiste las credenciales WARP entre reinicios
    healthcheck:
      test: ["CMD", "curl", "-sx", "http://localhost:8080", "https://cloudflare.com/cdn-cgi/trace"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s      # WARP tarda ~60s en conectarse la primera vez

  # ─── Tu backend de música ──────────────────────────────────────────────────
  backend:
    build: .
    container_name: mymusick-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HTTPS_PROXY=http://warp-proxy:8080
      - HTTP_PROXY=http://warp-proxy:8080
    depends_on:
      warp-proxy:
        condition: service_healthy   # espera a que WARP esté conectado
    env_file:
      - .env

volumes:
  warp-config:
