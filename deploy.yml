name: Deploy MYMUSICK

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear config.js con secret
        run: |
          echo "const CONFIG = { BACKEND_URL: '${{ secrets.BACKEND_URL }}' };" > config.js

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
